name: Build & Test

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test-go:
    name: Testes Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: projetos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: projetos/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-go:
    name: Build Go (cross-compile)
    runs-on: ubuntu-latest
    needs: test-go

    defaults:
      run:
        working-directory: projetos

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: projetos/go.sum

      - name: Build assinatura
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/assinatura-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/assinatura

      - name: Build simulador
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o dist/simulador-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/simulador

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binarios-${{ matrix.goos }}-${{ matrix.goarch }}
          path: projetos/dist/
          retention-days: 7

  build-java:
    name: Build Java (assinador.jar)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projetos/assinador-java

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('projetos/assinador-java/pom.xml') }}

      - name: Build e testes
        run: mvn -B clean verify

      - name: Upload assinador.jar
        uses: actions/upload-artifact@v4
        with:
          name: assinador-jar
          path: projetos/assinador-java/target/assinador-*.jar
          retention-days: 7
