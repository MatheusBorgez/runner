name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Testes (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: projetos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: projetos/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  test-java:
    name: Testes Java
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projetos/assinador-java

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('projetos/assinador-java/pom.xml') }}

      - name: Test
        run: mvn -B clean verify

  build:
    name: Build artefatos
    runs-on: ubuntu-latest
    needs: [test, test-java]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: projetos/go.sum

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('projetos/assinador-java/pom.xml') }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Extrair versão da tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Build assinador.jar
        working-directory: projetos/assinador-java
        run: mvn -B clean package -DskipTests

      - name: Build binários Go (cross-compile)
        working-directory: projetos
        run: |
          mkdir -p dist
          declare -A PLATFORMS=(
            ["linux/amd64"]=""
            ["windows/amd64"]=".exe"
            ["darwin/amd64"]=""
          )
          for platform in "${!PLATFORMS[@]}"; do
            OS="${platform%/*}"
            ARCH="${platform#*/}"
            EXT="${PLATFORMS[$platform]}"

            GOOS=$OS GOARCH=$ARCH go build \
              -ldflags "-X github.com/kyriosdata/runner/cmd/assinatura/cli.version=${{ env.VERSION }} -X github.com/kyriosdata/runner/cmd/simulador/cli.version=${{ env.VERSION }}" \
              -o dist/assinatura-${{ env.VERSION }}-${OS}-${ARCH}${EXT} \
              ./cmd/assinatura

            GOOS=$OS GOARCH=$ARCH go build \
              -ldflags "-X github.com/kyriosdata/runner/cmd/simulador/cli.version=${{ env.VERSION }}" \
              -o dist/simulador-${{ env.VERSION }}-${OS}-${ARCH}${EXT} \
              ./cmd/simulador
          done

      - name: Copiar assinador.jar para dist
        run: |
          cp projetos/assinador-java/target/assinador-*.jar projetos/dist/assinador-${{ env.VERSION }}.jar

      - name: Checksums SHA256
        working-directory: projetos/dist
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Assinar artefatos com Cosign
        working-directory: projetos/dist
        run: |
          for f in assinatura-* simulador-* assinador-*.jar; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes \
              --output-certificate "$f.pem" \
              --output-signature "$f.sig" \
              "$f"
          done

      - name: Upload ao GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            projetos/dist/*
